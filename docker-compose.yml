services:
  # --- Docker Socket Proxy ---
  # Restricts backend access to only the Docker API endpoints it needs.
  # The backend connects via DOCKER_HOST=tcp://docker-socket-proxy:2375
  # instead of mounting the raw Docker socket directly.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    privileged: true
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read operations
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      # Write operations (needed for spawning/killing)
      POST: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 1
      # Deny everything else
      EXEC: 0
      SWARM: 0
      VOLUMES: 0
      SERVICES: 0
      TASKS: 0
      SECRETS: 0
      CONFIGS: 0
      PLUGINS: 0
      NODES: 0
      BUILD: 0
      COMMIT: 0
    networks:
      - kage-internal

  # --- Backend API ---
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - kage-data:/app/data
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    networks:
      - kage-internal

networks:
  kage-internal:
    driver: bridge

volumes:
  kage-data:
    driver: local
